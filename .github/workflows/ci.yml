name: CI

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: kgaut/navidrome-tools

jobs:
  phpcs:
    name: Coding standard (PHP_CodeSniffer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer:v2
          extensions: pdo_sqlite, intl
      - uses: ramsey/composer-install@v3
        with:
          composer-options: --prefer-dist
      - run: vendor/bin/phpcs

  phpstan:
    name: Static analysis (PHPStan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer:v2
          extensions: pdo_sqlite, intl
      - uses: ramsey/composer-install@v3
        with:
          composer-options: --prefer-dist
      - run: vendor/bin/phpstan analyse --memory-limit=512M --no-progress

  tests:
    name: PHPUnit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer:v2
          extensions: pdo_sqlite, intl
      - uses: ramsey/composer-install@v3
        with:
          composer-options: --prefer-dist
      - run: vendor/bin/phpunit --colors=always

  docker-build:
    name: Docker image build (validation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: navidrome-tools:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-publish:
    name: Docker image publish
    runs-on: ubuntu-latest
    needs: [phpcs, phpstan, tests, docker-build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=main-,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=develop-,enable=${{ github.ref == 'refs/heads/develop' }}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
      - id: appver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: APP_VERSION=${{ steps.appver.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify:
    name: Notify CI result (Discord/Slack)
    runs-on: ubuntu-latest
    # Depend on every other job and run even when one failed, so the
    # notification reflects the WHOLE run's outcome.
    needs: [phpcs, phpstan, tests, docker-build, docker-publish]
    if: always()
    steps:
      - name: Compute overall status
        id: status
        env:
          # A job is OK when it succeeded OR was skipped (docker-publish is
          # skipped on PRs and non-default branches). Only real failures /
          # cancellations flip the run to « failure ».
          FAILED: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          if [[ "$FAILED" == "true" ]]; then
            echo "state=échec" >> "$GITHUB_OUTPUT"
            echo "emoji=❌" >> "$GITHUB_OUTPUT"
          else
            echo "state=succès" >> "$GITHUB_OUTPUT"
            echo "emoji=✅" >> "$GITHUB_OUTPUT"
          fi
      - name: Send webhook
        env:
          # Set whichever you use (or both) in repo secrets. Fork PRs don't
          # receive secrets → the step no-ops with a warning, never fails.
          DISCORD_WEBHOOK_URL: ${{ secrets.CI_DISCORD_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.CI_SLACK_WEBHOOK_URL }}
          STATE: ${{ steps.status.outputs.state }}
          EMOJI: ${{ steps.status.outputs.emoji }}
        run: |
          # Build the message from runner-provided env vars. Never inline
          # workflow template expressions into the script (a crafted branch
          # name could inject) — and note GitHub parses such expressions even
          # inside run blocks, so don't write the empty-braces token here.
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          MSG="${EMOJI} CI ${STATE} — ${GITHUB_REPOSITORY} @ ${GITHUB_REF_NAME} (${GITHUB_SHA:0:7}) · ${GITHUB_EVENT_NAME} · ${RUN_URL}"

          sent=0
          if [[ -n "$DISCORD_WEBHOOK_URL" ]]; then
            curl -fsS -X POST -H 'Content-Type: application/json' \
              --data "$(jq -nc --arg c "$MSG" '{content: $c}')" "$DISCORD_WEBHOOK_URL"
            sent=1
          fi
          if [[ -n "$SLACK_WEBHOOK_URL" ]]; then
            curl -fsS -X POST -H 'Content-Type: application/json' \
              --data "$(jq -nc --arg t "$MSG" '{text: $t}')" "$SLACK_WEBHOOK_URL"
            sent=1
          fi
          if [[ "$sent" -eq 0 ]]; then
            echo "::warning::Aucun webhook configuré (secrets CI_DISCORD_WEBHOOK_URL / CI_SLACK_WEBHOOK_URL). Notification ignorée."
          fi
