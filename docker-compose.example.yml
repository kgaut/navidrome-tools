# Exemple de configuration Docker Compose pour Navidrome Tools v2.
# Copiez ce fichier en docker-compose.yml et adaptez les valeurs.
# Les variables d'environnement peuvent aussi être passées via un .env.

services:
  navidrome-tools-web:
    image: ghcr.io/kgaut/navidrome-tools:develop
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      APP_ENV: prod
      APP_SECRET: "changeme-openssl-rand-hex-32"
      APP_AUTH_USER: admin
      APP_AUTH_PASSWORD: "changeme"
      DATABASE_URL: "sqlite:///%kernel.project_dir%/var/data.db"
      MESSENGER_TRANSPORT_DSN: "doctrine://default?auto_setup=0"
      NAVIDROME_DB_PATH: /data/navidrome.db
      NAVIDROME_URL: http://navidrome:4533
      NAVIDROME_USER: admin
      NAVIDROME_PASSWORD: "changeme"
      NAVIDROME_CONTAINER_NAME: ""   # nom du conteneur Navidrome pour start/stop
      NAVIDROME_STOP_TIMEOUT_SECONDS: "60"
      NAVIDROME_STOP_WAIT_CEILING_SECONDS: "30"
      LASTFM_API_KEY: ""
      LASTFM_API_SECRET: ""
      LASTFM_USER: ""
      LASTFM_PAGE_DELAY_SECONDS: "10"
      LASTFM_FUZZY_MAX_DISTANCE: "0"
      LASTFM_MATCH_CACHE_TTL_DAYS: "30"
      STRAWBERRY_DB_PATH: ""         # ex: /data/strawberry/strawberry.db
      BACKUP_RETENTION_DAYS: "7"
      RUN_HISTORY_RETENTION_DAYS: "90"
      NOTIFY_DRIVERS: ""
      NOTIFY_ON: error
    volumes:
      - navidrome-tools-data:/app/var
      # Base Navidrome en lecture seule (écriture gérée par app:scrobbles:sync-navidrome)
      - /path/to/navidrome/data/navidrome.db:/data/navidrome.db:ro
      # Optionnel : base Strawberry (lecture/écriture pour le sync playcount)
      # - /path/to/strawberry/data:/data/strawberry
      # Optionnel : socket Docker pour start/stop Navidrome depuis l'UI
      # - /var/run/docker.sock:/var/run/docker.sock

  # Worker Symfony Messenger — consomme la file des jobs lancés depuis l'UI
  # (fetch Last.fm, sync Navidrome, sync Strawberry, rematch…).
  # Sans ce service, les boutons de l'UI ne déclenchent rien.
  navidrome-tools-worker:
    image: ghcr.io/kgaut/navidrome-tools:develop
    restart: unless-stopped
    environment:
      APP_MODE: worker
      APP_ENV: prod
      APP_SECRET: "changeme-openssl-rand-hex-32"   # même secret que web
      DATABASE_URL: "sqlite:///%kernel.project_dir%/var/data.db"
      MESSENGER_TRANSPORT_DSN: "doctrine://default?auto_setup=0"
      NAVIDROME_DB_PATH: /data/navidrome.db
      NAVIDROME_URL: http://navidrome:4533
      NAVIDROME_USER: admin
      NAVIDROME_PASSWORD: "changeme"
      NAVIDROME_CONTAINER_NAME: ""
      NAVIDROME_STOP_TIMEOUT_SECONDS: "60"
      NAVIDROME_STOP_WAIT_CEILING_SECONDS: "30"
      LASTFM_API_KEY: ""
      LASTFM_API_SECRET: ""
      LASTFM_USER: ""
      LASTFM_PAGE_DELAY_SECONDS: "10"
      LASTFM_FUZZY_MAX_DISTANCE: "0"
      LASTFM_MATCH_CACHE_TTL_DAYS: "30"
      STRAWBERRY_DB_PATH: ""
      BACKUP_RETENTION_DAYS: "7"
      RUN_HISTORY_RETENTION_DAYS: "90"
      NOTIFY_DRIVERS: ""
      NOTIFY_ON: error
    volumes:
      - navidrome-tools-data:/app/var   # MÊME volume que le service web
      - /path/to/navidrome/data/navidrome.db:/data/navidrome.db  # RW pour le sync
      # - /path/to/strawberry/data:/data/strawberry
      # - /var/run/docker.sock:/var/run/docker.sock

volumes:
  navidrome-tools-data:
