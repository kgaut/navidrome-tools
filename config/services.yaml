parameters:
    # Defaults for the optional Playlists env vars: a deployment whose .env
    # predates the playlist feature keeps booting without edits. A real env
    # var (.env, docker-compose, phpunit) always overrides these. `default::`
    # is unfit for the ints (it falls back to 0 → empty/broken playlists),
    # hence parameter-level defaults with real values.
    env(PLAYLISTS_ENABLED): ''
    env(PLAYLIST_DEFAULT_LIMIT): '50'
    env(PLAYLIST_RETOUR_MAX_YEARS): '25'
    env(PLAYLIST_RETOUR_WINDOW_DAYS): '30'
    env(PLAYLIST_RETOUR_PER_YEAR): '10'
    env(PLAYLIST_PEPITES_MIN_PLAYS): '5'
    env(PLAYLIST_PEPITES_SILENCE_MONTHS): '12'

    app.auth_user: '%env(APP_AUTH_USER)%'
    app.auth_password: '%env(APP_AUTH_PASSWORD)%'
    app.version: '%env(default::APP_VERSION)%'
    app.run_history_retention_days: '%env(int:RUN_HISTORY_RETENTION_DAYS)%'
    app.backup_dir: '%kernel.project_dir%/var/backups'
    app.backup_retention_days: '%env(int:BACKUP_RETENTION_DAYS)%'
    navidrome.db_path: '%env(resolve:NAVIDROME_DB_PATH)%'
    navidrome.url: '%env(NAVIDROME_URL)%'
    navidrome.user: '%env(NAVIDROME_USER)%'
    navidrome.password: '%env(NAVIDROME_PASSWORD)%'
    navidrome.container_name: '%env(NAVIDROME_CONTAINER_NAME)%'
    navidrome.container_stop_timeout: '%env(int:NAVIDROME_STOP_TIMEOUT_SECONDS)%'
    navidrome.container_stop_wait_ceiling: '%env(int:NAVIDROME_STOP_WAIT_CEILING_SECONDS)%'
    lastfm.user: '%env(LASTFM_USER)%'
    lastfm.api_key: '%env(LASTFM_API_KEY)%'
    lastfm.api_secret: '%env(LASTFM_API_SECRET)%'
    lastfm.page_delay_seconds: '%env(int:LASTFM_PAGE_DELAY_SECONDS)%'
    lastfm.fuzzy_max_distance: '%env(int:LASTFM_FUZZY_MAX_DISTANCE)%'
    lastfm.match_cache_ttl_days: '%env(int:LASTFM_MATCH_CACHE_TTL_DAYS)%'
    musicbrainz.user_agent: '%env(MUSICBRAINZ_USER_AGENT)%'
    musicbrainz.base_url: '%env(MUSICBRAINZ_BASE_URL)%'
    lidarr.url: '%env(default::LIDARR_URL)%'
    help.compose_service: '%env(default::HELP_COMPOSE_SERVICE)%'
    strawberry.db_path: '%env(resolve:STRAWBERRY_DB_PATH)%'
    playlists.enabled: '%env(PLAYLISTS_ENABLED)%'
    playlists.default_limit: '%env(int:PLAYLIST_DEFAULT_LIMIT)%'
    playlist.retour.max_years: '%env(int:PLAYLIST_RETOUR_MAX_YEARS)%'
    playlist.retour.window_days: '%env(int:PLAYLIST_RETOUR_WINDOW_DAYS)%'
    playlist.retour.per_year: '%env(int:PLAYLIST_RETOUR_PER_YEAR)%'
    playlist.pepites.min_plays: '%env(int:PLAYLIST_PEPITES_MIN_PLAYS)%'
    playlist.pepites.silence_months: '%env(int:PLAYLIST_PEPITES_SILENCE_MONTHS)%'
    notify.drivers: '%env(NOTIFY_DRIVERS)%'
    notify.on: '%env(NOTIFY_ON)%'
    notify.gotify.url: '%env(NOTIFY_GOTIFY_URL)%'
    notify.gotify.token: '%env(NOTIFY_GOTIFY_TOKEN)%'
    notify.gotify.priority: '%env(int:NOTIFY_GOTIFY_PRIORITY)%'
    notify.slack.webhook_url: '%env(NOTIFY_SLACK_WEBHOOK_URL)%'
    notify.discord.webhook_url: '%env(NOTIFY_DISCORD_WEBHOOK_URL)%'
    notify.pushover.token: '%env(NOTIFY_PUSHOVER_TOKEN)%'
    notify.pushover.user: '%env(NOTIFY_PUSHOVER_USER)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: false
        bind:
            $projectDir: '%kernel.project_dir%'
            $defaultUser: '%lastfm.user%'

    _instanceof:
        App\Notifier\NotifierDriverInterface:
            tags: ['app.notifier_driver']
        App\Playlist\PlaylistDefinitionInterface:
            tags: ['app.playlist_definition']

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Security\EnvUserProvider:
        arguments:
            $username: '%app.auth_user%'
            $plainPassword: '%app.auth_password%'

    App\Doctrine\SqliteBusyTimeoutMiddleware:
        tags:
            - { name: doctrine.middleware }

    App\Playlist\PlaylistGenerator:
        arguments:
            $definitions: !tagged_iterator app.playlist_definition
            $enabledCsv: '%playlists.enabled%'
            $defaultLimit: '%playlists.default_limit%'

    App\Playlist\Definition\RetourEnArriereDefinition:
        arguments:
            $maxYears: '%playlist.retour.max_years%'
            $windowDays: '%playlist.retour.window_days%'
            $perYear: '%playlist.retour.per_year%'

    App\Playlist\Definition\TopDuMoisDefinition:
        arguments:
            $limit: '%playlists.default_limit%'

    App\Playlist\Definition\TopAllTimeDefinition:
        arguments:
            $limit: '%playlists.default_limit%'

    App\Playlist\Definition\CoupsDeCoeurDefinition:
        arguments:
            $limit: '%playlists.default_limit%'

    App\Playlist\Definition\PepitesOublieesDefinition:
        arguments:
            $minPlays: '%playlist.pepites.min_plays%'
            $silenceMonths: '%playlist.pepites.silence_months%'
            $limit: '%playlists.default_limit%'

    App\Service\BackupService:
        arguments:
            $backupDir: '%app.backup_dir%'

    App\Command\PurgeBackupsCommand:
        arguments:
            $retentionDays: '%app.backup_retention_days%'

    App\Command\PurgeHistoryCommand:
        arguments:
            $retentionDays: '%app.run_history_retention_days%'

    App\Notifier\Notifier:
        arguments:
            $drivers: !tagged_iterator app.notifier_driver
            $enabledDriversCsv: '%notify.drivers%'
            $notifyOn: '%notify.on%'

    App\Notifier\Driver\GotifyDriver:
        arguments:
            $url: '%notify.gotify.url%'
            $token: '%notify.gotify.token%'
            $priority: '%notify.gotify.priority%'

    App\Notifier\Driver\SlackDriver:
        arguments:
            $webhookUrl: '%notify.slack.webhook_url%'

    App\Notifier\Driver\DiscordDriver:
        arguments:
            $webhookUrl: '%notify.discord.webhook_url%'

    App\Notifier\Driver\PushoverDriver:
        arguments:
            $token: '%notify.pushover.token%'
            $user: '%notify.pushover.user%'

    App\Navidrome\NavidromeRepository:
        arguments:
            $dbPath: '%navidrome.db_path%'
            $userName: '%navidrome.user%'

    App\Subsonic\SubsonicClient:
        arguments:
            $baseUrl: '%navidrome.url%'
            $user: '%navidrome.user%'
            $password: '%navidrome.password%'

    App\LastFm\LastFmClient:
        arguments:
            $pageDelaySeconds: '%lastfm.page_delay_seconds%'

    App\MusicBrainz\MusicBrainzClient:
        arguments:
            $userAgent: '%musicbrainz.user_agent%'
            $baseUrl: '%musicbrainz.base_url%'

    App\Command\FetchLastFmCommand:
        arguments:
            $defaultApiKey: '%lastfm.api_key%'

    App\Controller\LastFmImportController:
        arguments:
            $defaultApiKey: '%lastfm.api_key%'

    App\LastFm\ScrobbleMatcher:
        arguments:
            $fuzzyMaxDistance: '%lastfm.fuzzy_max_distance%'
            $cacheTtlDays: '%lastfm.match_cache_ttl_days%'
            $lastFmApiKey: '%lastfm.api_key%'

    App\Docker\NavidromeContainerConfig:
        arguments:
            $containerName: '%navidrome.container_name%'
            $stopTimeoutSeconds: '%navidrome.container_stop_timeout%'
            $stopWaitCeilingSeconds: '%navidrome.container_stop_wait_ceiling%'

    App\Navidrome\NavidromeDbBackup:
        arguments:
            $dbPath: '%navidrome.db_path%'

    App\Strawberry\StrawberryRepository:
        arguments:
            $dbPath: '%strawberry.db_path%'

    App\Strawberry\StrawberryUploadService:
        arguments:
            $varDir: '%kernel.project_dir%/var'

    App\Twig\LidarrExtension:
        arguments:
            $lidarrUrl: '%lidarr.url%'
        tags: ['twig.extension']

    App\Twig\ScrobbleLinksExtension:
        arguments:
            $navidromeUrl: '%navidrome.url%'
        tags: ['twig.extension']

    App\Controller\HelpController:
        arguments:
            $composeService: '%help.compose_service%'

    App\Controller\LastFmStatsController:
        arguments:
            $defaultApiKey: '%lastfm.api_key%'

    App\Command\SyncLastFmLovedCommand:
        arguments:
            $defaultApiKey: '%lastfm.api_key%'

    App\Command\LastFmAuthCommand:
        arguments:
            $defaultApiKey: '%lastfm.api_key%'
            $defaultApiSecret: '%lastfm.api_secret%'

    App\Command\SyncLovesLastFmToNavidromeCommand:
        arguments:
            $defaultApiKey: '%lastfm.api_key%'

    App\Command\SyncLovesNavidromeToLastFmCommand:
        arguments:
            $defaultApiKey: '%lastfm.api_key%'
            $defaultApiSecret: '%lastfm.api_secret%'
