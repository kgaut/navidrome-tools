parameters:
    navidrome.db_path: '%env(NAVIDROME_DB_PATH)%'
    navidrome.url: '%env(NAVIDROME_URL)%'
    navidrome.user: '%env(NAVIDROME_USER)%'
    navidrome.password: '%env(NAVIDROME_PASSWORD)%'
    app.auth_user: '%env(APP_AUTH_USER)%'
    app.auth_password: '%env(APP_AUTH_PASSWORD)%'
    app.stats_refresh_schedule: '%env(STATS_REFRESH_SCHEDULE)%'
    app.run_history_retention_days: '%env(int:RUN_HISTORY_RETENTION_DAYS)%'
    app.covers_cache_path: '%env(resolve:COVERS_CACHE_PATH)%'
    lastfm.api_key: '%env(LASTFM_API_KEY)%'
    lastfm.api_secret: '%env(LASTFM_API_SECRET)%'
    lastfm.page_delay_seconds: '%env(int:LASTFM_PAGE_DELAY_SECONDS)%'
    lastfm.fuzzy_max_distance: '%env(int:LASTFM_FUZZY_MAX_DISTANCE)%'
    lastfm.love_sync_schedule: '%env(LASTFM_LOVE_SYNC_SCHEDULE)%'
    lidarr.url: '%env(LIDARR_URL)%'
    lidarr.api_key: '%env(LIDARR_API_KEY)%'
    lidarr.root_folder_path: '%env(LIDARR_ROOT_FOLDER_PATH)%'
    lidarr.quality_profile_id: '%env(int:LIDARR_QUALITY_PROFILE_ID)%'
    lidarr.metadata_profile_id: '%env(int:LIDARR_METADATA_PROFILE_ID)%'
    lidarr.monitor: '%env(LIDARR_MONITOR)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: false
        bind:
            $projectDir: '%kernel.project_dir%'

    _instanceof:
        App\Generator\PlaylistGeneratorInterface:
            tags: ['app.playlist_generator']

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Generator\GeneratorRegistry:
        arguments:
            $generators: !tagged_iterator app.playlist_generator

    App\Navidrome\NavidromeRepository:
        arguments:
            $dbPath: '%navidrome.db_path%'
            $userName: '%navidrome.user%'

    App\Subsonic\SubsonicClient:
        arguments:
            $baseUrl: '%navidrome.url%'
            $user: '%navidrome.user%'
            $password: '%navidrome.password%'

    App\Security\EnvUserProvider:
        arguments:
            $username: '%app.auth_user%'
            $plainPassword: '%app.auth_password%'

    App\Command\DumpCronCommand:
        arguments:
            $statsRefreshSchedule: '%app.stats_refresh_schedule%'
            $loveSyncSchedule: '%lastfm.love_sync_schedule%'

    App\Command\PurgeHistoryCommand:
        arguments:
            $retentionDays: '%app.run_history_retention_days%'

    App\Lidarr\LidarrConfig:
        arguments:
            $url: '%lidarr.url%'
            $apiKey: '%lidarr.api_key%'
            $rootFolderPath: '%lidarr.root_folder_path%'
            $qualityProfileId: '%lidarr.quality_profile_id%'
            $metadataProfileId: '%lidarr.metadata_profile_id%'
            $monitor: '%lidarr.monitor%'

    App\Controller\LastFmImportController:
        arguments:
            $navidromeUrl: '%navidrome.url%'

    App\Controller\NavidromeHistoryController:
        arguments:
            $navidromeUrl: '%navidrome.url%'

    App\LastFm\LastFmClient:
        arguments:
            $pageDelaySeconds: '%lastfm.page_delay_seconds%'

    App\LastFm\LastFmImporter:
        arguments:
            $fuzzyMaxDistance: '%lastfm.fuzzy_max_distance%'

    App\LastFm\LastFmAuthService:
        arguments:
            $apiKey: '%lastfm.api_key%'
            $apiSecret: '%lastfm.api_secret%'

    App\LastFm\LovedStarredSyncService:
        arguments:
            $apiKey: '%lastfm.api_key%'
            $apiSecret: '%lastfm.api_secret%'

    App\Service\CoverArtCache:
        arguments:
            $cacheRoot: '%app.covers_cache_path%'
