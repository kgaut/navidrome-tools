parameters:
    app.auth_user: '%env(APP_AUTH_USER)%'
    app.auth_password: '%env(APP_AUTH_PASSWORD)%'
    app.version: '%env(default::APP_VERSION)%'
    app.run_history_retention_days: '%env(int:RUN_HISTORY_RETENTION_DAYS)%'
    app.backup_retention_days: '%env(int:BACKUP_RETENTION_DAYS)%'
    navidrome.db_path: '%env(NAVIDROME_DB_PATH)%'
    navidrome.url: '%env(NAVIDROME_URL)%'
    navidrome.user: '%env(NAVIDROME_USER)%'
    navidrome.password: '%env(NAVIDROME_PASSWORD)%'
    navidrome.container_name: '%env(NAVIDROME_CONTAINER_NAME)%'
    navidrome.container_stop_timeout: '%env(int:NAVIDROME_STOP_TIMEOUT_SECONDS)%'
    navidrome.container_stop_wait_ceiling: '%env(int:NAVIDROME_STOP_WAIT_CEILING_SECONDS)%'
    lastfm.api_key: '%env(LASTFM_API_KEY)%'
    lastfm.api_secret: '%env(LASTFM_API_SECRET)%'
    lastfm.page_delay_seconds: '%env(int:LASTFM_PAGE_DELAY_SECONDS)%'
    lastfm.fuzzy_max_distance: '%env(int:LASTFM_FUZZY_MAX_DISTANCE)%'
    lastfm.match_cache_ttl_days: '%env(int:LASTFM_MATCH_CACHE_TTL_DAYS)%'
    strawberry.db_path: '%env(resolve:STRAWBERRY_DB_PATH)%'
    notify.drivers: '%env(NOTIFY_DRIVERS)%'
    notify.on: '%env(NOTIFY_ON)%'
    notify.gotify.url: '%env(NOTIFY_GOTIFY_URL)%'
    notify.gotify.token: '%env(NOTIFY_GOTIFY_TOKEN)%'
    notify.gotify.priority: '%env(int:NOTIFY_GOTIFY_PRIORITY)%'
    notify.slack.webhook_url: '%env(NOTIFY_SLACK_WEBHOOK_URL)%'
    notify.discord.webhook_url: '%env(NOTIFY_DISCORD_WEBHOOK_URL)%'
    notify.pushover.token: '%env(NOTIFY_PUSHOVER_TOKEN)%'
    notify.pushover.user: '%env(NOTIFY_PUSHOVER_USER)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: false
        bind:
            $projectDir: '%kernel.project_dir%'

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Security\EnvUserProvider:
        arguments:
            $username: '%app.auth_user%'
            $plainPassword: '%app.auth_password%'
