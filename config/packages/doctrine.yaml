doctrine:
    dbal:
        types:
            # Stores DateTimeImmutable as UTC and reads it back UTC-tagged,
            # so APP_TIMEZONE doesn't silently shift the instant. Use on
            # any column whose value is a true point in time (a scrobble
            # timestamp, an audit row's start/end), not a wall-clock that
            # only makes sense in the operator's local time.
            utc_datetime_immutable: App\Doctrine\UtcDateTimeImmutableType
        default_connection: default
        connections:
            default:
                url: '%env(resolve:DATABASE_URL)%'
                driver: 'pdo_sqlite'
                use_savepoints: true
            navidrome:
                driver: 'pdo_sqlite'
                path: '%navidrome.db_path%'
                memory: false
                charset: utf8
                # Read-only access (mode=ro). immutable=0 so we still see live writes.
                url: 'sqlite:///%navidrome.db_path%?mode=ro&immutable=0'

    orm:
        default_entity_manager: default
        auto_generate_proxy_classes: '%kernel.debug%'
        enable_native_lazy_objects: true
        entity_managers:
            default:
                connection: default
                naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
                auto_mapping: true
                identity_generation_preferences:
                    Doctrine\DBAL\Platforms\PostgreSQLPlatform: identity
                mappings:
                    App:
                        type: attribute
                        is_bundle: false
                        dir: '%kernel.project_dir%/src/Entity'
                        prefix: 'App\Entity'
                        alias: App

when@prod:
    doctrine:
        orm:
            auto_generate_proxy_classes: false
            proxy_dir: '%kernel.build_dir%/doctrine/orm/Proxies'
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
